<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Menu</title>

<style>
  ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .menu > li > a {
    display: block;
    padding: 12px 20px;
    color: white;
    background: #333;
    text-decoration: none;
  }

  .menu > li > a:hover {
    background: #444;
  }

  /* No dropdown styling because you haven't learned those concepts yet */
</style>

</head>
<body>

<nav>
  <ul class="menu">
    <li><a href="#">Home</a></li>

    <li>
      <a href="#">Products</a>
      <ul>
        <li><a href="#">Laptops</a></li>
        <li><a href="#">Desktops</a></li>
        <li><a href="#">Accessories</a></li>
      </ul>
    </li>

    <li>
      <a href="#">About</a>
      <ul>
        <li><a href="#">Team</a></li>
        <li><a href="#">History</a></li>
      </ul>
    </li>

    <li><a href="#">Contact</a></li>
  </ul>
</nav>

</body>
</html>

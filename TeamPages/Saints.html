
<style> .banner {
  position: relative;
  width: 100%;
  height: 180px;
  background: white; /* left side */
  overflow: hidden;
}

/* Black right side */
.banner::before {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  width: 60%;
  height: 100%;
  background: black;
  z-index: 1;
}

/* Gold diagonal separator */
.banner::after {
  content: "";
  position: absolute;
  top: 0;
  left: 40%;
  width: 20%;
  height: 100%;
  background: #d4af37; /* Saints gold */
  transform: skewX(-20deg);
  transform-origin: center;
  z-index: 2;
}

</style>
</head>
<body>
  <img src="NO.webp" alt="NO Saints Logo">
<div class="team-card">
  <div class="team-info">
    <h2>New Orleans Saints</h2>
    <p class="division">4th NFC South</p>
    <p class="record">6 - 11 - 0</p>
  
</body>

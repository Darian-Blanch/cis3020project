<!DOCTYPE html>
<html>
<head>
  <style>
    .banner {
      position: relative;
      width: 100%;
      height: 180px;
      background: white;
      overflow: hidden;
    }

    .banner::before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 60%;
      height: 100%;
      background: black;
      z-index: 1;
    }

    .banner::after {
      content: "";
      position: absolute;
      top: 0;
      left: 40%;
      width: 20%;
      height: 100%;
      background: #d4af37;
      transform: skewX(-20deg);
      transform-origin: center;
      z-index: 2;
    }

    .banner-content {
      position: relative;
      z-index: 3;
      padding: 20px;
      color: black;
    }

    .banner-logo {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 120px;
      z-index: 3;
    }
  </style>
</head>

<body>

  <div class="banner">
    <div class="banner-content">
      <h2>New Orleans Saints</h2>
      <p>4th NFC South</p>
      <p>6 - 11 - 0</p>
    </div>

    <img class="banner-logo" src="../NO.webp" alt="Saints Logo">
  </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Saints Banner</title>

  <style>
    .banner {
      position: relative;
      width: 100%;
      height: 180px;
      background: white;
      overflow: hidden;
      border-bottom: 10px solid #d4af37;
    }

    /* Black right side with matching diagonal */
    .banner::before {
      content: "";
      position: absolute;
      top: 0;
      right: -60px;        /* shifts black outward so diagonal aligns */
      width: 60%;          /* wide enough to cover the right side */
      height: 100%;
      background: black;
      transform: skewX(-20deg);
      transform-origin: top right;
      z-index: 1;
      border-bottom: 10px solid #d4af37;
    }

    /* Gold diagonal separator */
    .banner::after {
      content: "";
      position: absolute;
      top: 0;
      left: 40%;
      width: 25%;          /* wide enough to fully cover seam */
      height: 100%;
      background: #d4af37; /* Saints gold */
      transform: skewX(-20deg);
      transform-origin: center;
      z-index: 2;
      border-bottom: 10px solid #d4af37;
    }

    /* Text content */
    .banner-content {
      position: relative;
      z-index: 3;
      padding: 20px;
      color: black;
      font-family: Arial, sans-serif;
    }

    /* Logo */
    .banner-logo {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 120px;
      z-index: 3;
    }
  </style>
</head>

<body>

  <div class="banner">
    <div class="banner-content">
      <h2>New Orleans Saints</h2>
      <p>4th NFC South</p>
      <p>6 - 11 - 0</p>
    </div>

    <img class="banner-logo" src="../NO.webp" alt="Saints Logo">
  </div>

</body>
</html>
